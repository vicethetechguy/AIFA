<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AIFA 2026</title>
    <meta name="description" content="Register for AI Fest Africa 2026">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="auth-main">
        <!-- LEFT COLUMN (Animated Background) -->
        <div class="auth-left">
            <div class="auth-gradient-overlay"></div>
            
            <div class="auth-left-content">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
                        <span style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800;">AIFA 2026</span>
                    </a>
                </div>
                
                <blockquote style="margin-top: auto; max-width: 550px;">
                    <img src="assets/speaker.jpg" alt="Speaker" style="width: 100%; max-width: 550px; height: auto; aspect-ratio: 3/2; object-fit: cover; object-position: top center; border-radius: 16px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <p style="font-size: 1.5rem; font-family: var(--font-primary); font-weight: 500; line-height: 1.4; margin-bottom: 16px;">
                        &ldquo;AI is transforming Africa. AIFA is where the continent's brightest minds gather to build the future.&rdquo;
                    </p>
                    <footer style="font-family: var(--font-heading); font-weight: 600; opacity: 0.7;">
                        ~ Harvoxx Tech
                    </footer>
                </blockquote>
            </div>
            
        </div>

        <!-- RIGHT COLUMN (Form) -->
        <div class="auth-right">
            <div class="auth-radial-bg"></div>
            
            <a href="index.html" class="auth-btn-ghost" style="position: absolute; top: 30px; left: 30px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; z-index: 20;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Home
            </a>
            
            <div class="auth-form-container fade-up delay-1">
                <!-- Mobile Logo Header -->
                <div class="mobile-auth-header" style="display: none; align-items: center; gap: 8px; margin-bottom: 32px;">
                    <span style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800;">AIFA 2026</span>
                </div>

                <div style="margin-bottom: 32px;">
                    <h1 style="font-family: var(--font-heading); font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em;">SECURE YOUR SPOT</h1>
                    <p style="color: var(--text-color); opacity: 0.6;">Register to create your AIFA account.</p>
                </div>

                <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 16px;">
                    <div class="auth-input-wrapper">
                        <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" class="auth-input" placeholder="Full Name" required>
                    </div>

                    <div class="auth-input-wrapper">
                        <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/></svg>
                        <input type="email" class="auth-input" placeholder="your.email@example.com" required>
                    </div>
                    
                    <div class="auth-input-wrapper" style="position: relative;">
                        <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><path d="M9 21V9"/></svg>
                        <select class="auth-input" required style="appearance: none; -webkit-appearance: none; padding-right: 30px; background-color: var(--bg-surface);">
                            <option value="" disabled selected style="background-color: #120821; color: #fff;">Select Pass Tier</option>
                            <option value="standard" style="background-color: #120821; color: #fff;">Standard Pass (Free)</option>
                            <option value="pro" style="background-color: #120821; color: #fff;">Professional Pass (₦25K)</option>
                            <option value="vip" style="background-color: #120821; color: #fff;">Premium VIP (₦50K)</option>
                        </select>
                        <svg style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.5;" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>

                    <button type="submit" class="auth-btn-solid mt-sm">Complete Registration</button>
                </form>
                
                <p style="color: var(--text-color); opacity: 0.5; font-size: 0.8rem; margin-top: 24px; text-align: center; line-height: 1.5;">
                    By clicking continue, you agree to our <br>
                    <a href="#" style="color: var(--text-color); opacity: 0.8; text-decoration: underline;">Terms of Service</a> and <a href="#" style="color: var(--text-color); opacity: 0.8; text-decoration: underline;">Privacy Policy</a>.
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
